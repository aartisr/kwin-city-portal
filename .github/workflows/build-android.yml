name: Build KWIN City Android Release

on:
  # Run on any version tag push (e.g. v1.0.0)
  push:
    tags:
      - 'v[0-9]*'
  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-android:
    name: Build Signed Android Artifacts
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 (required by AGP 8.x) ─────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Android SDK ─────────────────────────────────────────
      - name: Set ANDROID_SDK_ROOT
        run: echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Install required Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME 2>/dev/null || true

      # ── Gradle setup ────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # ── Version metadata from tag/manual input ─────────────
      - name: Resolve version metadata
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RAW="${GITHUB_REF_NAME}"
          else
            RAW="${{ inputs.version_name }}"
          fi

          VERSION_NAME="${RAW#v}"

          if [[ ! "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION_NAME"
            echo "Expected semver like 1.2.3"
            exit 1
          fi

          # Monotonic integer for Android versionCode.
          VERSION_CODE="${GITHUB_RUN_NUMBER}"

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      # ── Require signing secrets for production release ──────
      - name: Validate release signing secrets
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$KEYSTORE_B64" || -z "$KEYSTORE_PASSWORD" || -z "$KEY_ALIAS" ]]; then
            echo "Missing one or more required Android signing secrets."
            echo "Required: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS"
            exit 1
          fi

      # ── Decode keystore and write Gradle signing properties ─
      - name: Configure Android signing
        working-directory: android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > app/kwin-release.jks

          # PKCS12 keystores use the store password as the key password.
          EFFECTIVE_KEY_PASSWORD="$KEYSTORE_PASSWORD"
          if [[ -n "$KEY_PASSWORD" && "$KEY_PASSWORD" != "$KEYSTORE_PASSWORD" ]]; then
            echo "ANDROID_KEY_PASSWORD differs from ANDROID_KEYSTORE_PASSWORD."
            echo "This keystore was generated as PKCS12, so CI will use the store password for signing."
          fi

          # Fail early if the keystore cannot be opened or the alias is wrong.
          keytool -list -v \
            -keystore app/kwin-release.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null

          # Remove previously injected keys (defensive) and force a separator newline.
          sed -i '/^KWIN_RELEASE_/d' gradle.properties || true
          printf '\n' >> gradle.properties

          cat >> gradle.properties <<EOF
          KWIN_RELEASE_STORE_FILE=app/kwin-release.jks
          KWIN_RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD
          KWIN_RELEASE_KEY_ALIAS=$KEY_ALIAS
          KWIN_RELEASE_KEY_PASSWORD=$EFFECTIVE_KEY_PASSWORD
          EOF

      # ── local.properties ───────────────────────────────────
      - name: Create local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ── Build signed release APK + AAB ──────────────────────
      - name: Build signed release artifacts
        working-directory: android
        run: |
          gradle \
            assembleRelease \
            bundleRelease \
            -PKWIN_VERSION_NAME=${{ steps.version.outputs.version_name }} \
            -PKWIN_VERSION_CODE=${{ steps.version.outputs.version_code }} \
            --no-daemon --stacktrace

      # ── Rename outputs ───────────────────────────────────────
      - name: Rename release artifacts
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/kwin-city-${VERSION}-release.apk
          mv android/app/build/outputs/bundle/release/app-release.aab \
             android/app/build/outputs/bundle/release/kwin-city-${VERSION}-release.aab

      # ── Upload artifacts ─────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kwin-city-android-apk-release
          path: android/app/build/outputs/apk/release/kwin-city-*-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kwin-city-android-aab-release
          path: android/app/build/outputs/bundle/release/kwin-city-*-release.aab
          retention-days: 30

      # ── Create GitHub Release (only on tag pushes) ──────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 'KWIN City Android v${{ steps.version.outputs.version_name }}'
          body: |
            ## 📱 KWIN City Android App v${{ steps.version.outputs.version_name }}

            Signed Android release artifacts for KWIN City.

            - `APK` for direct installs
            - `AAB` for store distribution

            Trusted Web Activity (TWA) — wraps [kwin-city.com](https://kwin-city.com) in a native Android shell.

            ### Installation
            1. Download `kwin-city-${{ steps.version.outputs.version_name }}-release.apk` below
            2. On your Android device: **Settings → Security → Install unknown apps** → Allow
            3. Open the downloaded APK and tap **Install**
            4. Find "KWIN City" on your home screen

            > **Recommended:** Use the PWA install for automatic updates — open [kwin-city.com](https://kwin-city.com) in Chrome and tap "Add to Home Screen".

            ---
            Built automatically from `master` via GitHub Actions · Signed release · Open source
          files: |
            android/app/build/outputs/apk/release/kwin-city-*-release.apk
            android/app/build/outputs/bundle/release/kwin-city-*-release.aab
          draft: false
          prerelease: false
