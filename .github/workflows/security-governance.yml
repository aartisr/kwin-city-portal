name: Security Governance

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Dependency review
        id: dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Dependency graph disabled notice
        if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "::warning::Dependency review could not run. This commonly happens when Dependency graph is disabled for the repository."
          echo "::warning::Enable it at: https://github.com/aartisr/kwin-city-portal/settings/security_analysis"
